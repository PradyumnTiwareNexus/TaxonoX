<!-- Note Modal -->
<div class="modal-backdrop" id="note-modal" style="display:none">
  <div class="modal-box">
    <div class="modal-header"><span class="modal-title" id="note-modal-title">📋 New Note</span><button class="modal-close" data-modal-close="note-modal">✕</button></div>
    <div class="modal-body">
      <form id="note-form">
        <input type="hidden" id="note-edit-id" />
        <div class="form-group"><label class="form-label required">Title</label><input id="note-title" class="form-control" placeholder="Note title…" required /></div>
        <div class="form-group"><label class="form-label">Tags (comma-separated)</label><input id="note-tags" class="form-control" placeholder="Recon, Tips, SSRF" /></div>
        <div class="form-group"><label class="form-label">Content</label><textarea id="note-content" class="form-control" rows="8" placeholder="Markdown-style notes…"></textarea></div>
      </form>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" data-modal-close="note-modal">Cancel</button><button class="btn btn-primary" onclick="saveNote()">Save Note</button></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="assets/js/firebase-config.js"></script>
<script src="assets/js/storage.js"></script>
<script src="assets/js/auth-guard.js"></script>
<script src="assets/js/app.js"></script>
<script>
'use strict';
let noteSearchQ='';
function renderNotes(){
  const notes=TXStorage.get('notes',[]);
  const q=noteSearchQ.toLowerCase();
  const filtered=notes.filter(n=>!q||n.title.toLowerCase().includes(q)||(n.content||'').toLowerCase().includes(q)||(n.tags||[]).some(t=>t.toLowerCase().includes(q)));
  const grid=document.getElementById('notes-grid');
  if(!filtered.length){grid.innerHTML='<div class="empty-state" style="grid-column:span 3"><div class="empty-state-icon">📋</div><div class="empty-state-title">No notes yet</div><div class="empty-state-text">Click "+ New Note" to get started.</div></div>';return;}
  grid.innerHTML=filtered.map(n=>`
    <div class="card hover-lift" style="padding:16px;position:relative">
      ${n.pinned?'<span style="position:absolute;top:12px;right:12px;font-size:14px">📌</span>':''}
      <div style="font-weight:700;font-size:14px;color:var(--text-primary);margin-bottom:6px;padding-right:24px">${n.title}</div>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:10px">${TaxonoX.formatDate(n.date)}</div>
      <div style="font-size:12px;color:var(--text-secondary);margin-bottom:10px;line-height:1.6;max-height:80px;overflow:hidden">${(n.content||'').replace(/[#*`]/g,'').slice(0,200)}${(n.content||'').length>200?'…':''}</div>
      <div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:12px">${(n.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-secondary btn-sm" onclick="editNote('${n.id}')">✎ Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteNote('${n.id}')">🗑</button>
        <button class="btn btn-ghost btn-sm" onclick="togglePin('${n.id}')">${n.pinned?'📌 Unpin':'📌 Pin'}</button>
      </div>
    </div>`).join('');
}
function openNoteModal(editId){
  document.getElementById('note-modal-title').textContent=editId?'✎ Edit Note':'📋 New Note';
  document.getElementById('note-edit-id').value=editId||'';
  if(editId){
    const n=TXStorage.get('notes',[]).find(x=>x.id===editId);
    if(n){document.getElementById('note-title').value=n.title;document.getElementById('note-content').value=n.content||'';document.getElementById('note-tags').value=(n.tags||[]).join(', ');}
  } else {
    document.getElementById('note-title').value='';document.getElementById('note-content').value='';document.getElementById('note-tags').value='';
  }
  TaxonoX.openModal('note-modal');
}
function saveNote(){
  const title=document.getElementById('note-title').value.trim();
  if(!title){TaxonoX.showToast('error','Title required');return;}
  const editId=document.getElementById('note-edit-id').value;
  const notes=TXStorage.get('notes',[]);
  const tags=document.getElementById('note-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const content=document.getElementById('note-content').value;
  if(editId){
    const idx=notes.findIndex(n=>n.id===editId);
    if(idx!==-1){notes[idx]={...notes[idx],title,content,tags,date:new Date().toISOString().slice(0,10)};}
  } else {
    notes.unshift({id:'NOTE-'+Date.now(),title,content,tags,date:new Date().toISOString().slice(0,10),pinned:false});
  }
  TXStorage.set('notes',notes);
  TaxonoX.closeModal('note-modal');
  TaxonoX.showToast('success','Saved','Note saved successfully');
  renderNotes();
}
window.editNote=function(id){openNoteModal(id);};
window.deleteNote=function(id){
  if(!confirm('Delete this note?'))return;
  let notes=TXStorage.get('notes',[]);
  notes=notes.filter(n=>n.id!==id);
  TXStorage.set('notes',notes);
  TaxonoX.showToast('success','Deleted','Note deleted');
  renderNotes();
};
window.togglePin=function(id){
  const notes=TXStorage.get('notes',[]);
  const n=notes.find(x=>x.id===id);
  if(n){n.pinned=!n.pinned;TXStorage.set('notes',notes);renderNotes();}
};
document.addEventListener('DOMContentLoaded',()=>{
  const s=document.getElementById('note-search');
  if(s)s.addEventListener('input',()=>{noteSearchQ=s.value;renderNotes();});
  TXStorage.subscribe('notes',()=>renderNotes());
  renderNotes();
});
</script>
</body>
