<!-- ADD PAYLOAD MODAL -->
<div class="modal-backdrop" id="add-payload-modal" style="display:none">
  <div class="modal-box" style="max-width:500px">
    <div class="modal-header">
      <div class="modal-title">Add New Payload</div>
      <button class="modal-close" data-modal-close="add-payload-modal">✕</button>
    </div>
    <form id="add-payload-form">
      <div class="modal-body">
        <div class="grid grid-cols-2 gap-3">
          <div class="form-group" style="grid-column:span 2">
            <label class="form-label required">Payload Name</label>
            <input type="text" name="name" class="form-control" placeholder="e.g. XSS Basic Alert" required />
          </div>
          <div class="form-group">
            <label class="form-label required">Category</label>
            <input type="text" name="category" class="form-control" placeholder="XSS, SQLi, SSRF, etc." required />
          </div>
          <div class="form-group">
            <label class="form-label">Tags</label>
            <input type="text" name="tags" class="form-control" placeholder="basic, bypass, waf" />
          </div>
          <div class="form-group" style="grid-column:span 2">
            <label class="form-label required">Payload</label>
            <textarea name="payload" class="form-control" style="min-height:80px;font-family:var(--font-mono);font-size:12px" placeholder="Enter payload here…" required></textarea>
          </div>
          <div class="form-group" style="grid-column:span 2">
            <label class="form-label">Notes / Usage</label>
            <textarea name="notes" class="form-control" style="min-height:60px" placeholder="Context, usage tips, bypass notes…"></textarea>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-modal-close="add-payload-modal">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Payload</button>
      </div>
    </form>
  </div>
</div>

<script src="assets/js/app.js"></script>
<script>
let activeCategory = '';

function buildCategoryPills() {
  const payloads = TaxonoX.Storage.get('payloads', []);
  const cats = ['All', ...new Set(payloads.map(p => p.category).filter(Boolean))];
  const pills = document.getElementById('cat-pills');
  if (!pills) return;
  pills.innerHTML = cats.map((cat, i) => `
    <button class="btn btn-secondary btn-sm" data-cat="${i === 0 ? '' : cat}"
      onclick="filterPayloads('${i === 0 ? '' : cat}')"
      style="${i === 0 ? 'border-color:rgba(139,92,246,0.4);color:var(--color-purple-light)' : ''}">
      ${cat}
    </button>
  `).join('');
}

function filterPayloads(cat) {
  activeCategory = cat;
  document.querySelectorAll('#cat-pills button').forEach(btn => {
    const isActive = btn.dataset.cat === cat;
    btn.style.borderColor = isActive ? 'rgba(139,92,246,0.4)' : '';
    btn.style.color = isActive ? 'var(--color-purple-light)' : '';
  });
  loadPayloads();
}

function loadPayloads() {
  let payloads = TaxonoX.Storage.get('payloads', []);
  const q = document.getElementById('payload-search')?.value.toLowerCase() || '';

  if (activeCategory) payloads = payloads.filter(p => p.category === activeCategory);
  if (q) payloads = payloads.filter(p =>
    p.name.toLowerCase().includes(q) ||
    p.payload.toLowerCase().includes(q) ||
    (p.notes || '').toLowerCase().includes(q) ||
    (p.category || '').toLowerCase().includes(q)
  );

  const catColors = { XSS: '#8b5cf6', SQLi: '#ff2d55', SSRF: '#06b6d4', LFI: '#ff6b35', SSTI: '#fbbf24', default: '#64748b' };

  const grid = document.getElementById('payloads-grid');
  if (!grid) return;

  if (!payloads.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:span 2">
      <div class="empty-state-icon">💾</div>
      <div class="empty-state-title">No payloads found</div>
      <div class="empty-state-text">Add your offensive payloads to the vault.</div>
      <button class="btn btn-primary" style="margin-top:16px" data-modal-open="add-payload-modal">Add First Payload</button>
    </div>`;
    return;
  }

  grid.innerHTML = payloads.map((p, i) => {
    const color = catColors[p.category] || catColors.default;
    return `
      <div class="card animate-fade-in-up" style="animation-delay:${i*40}ms">
        <div class="card-body">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px">
            <div style="display:flex;align-items:center;gap:8px">
              <span class="badge" style="background:${color}22;color:${color};border-color:${color}44">${p.category}</span>
              <span class="vuln-id">${p.id}</span>
            </div>
            <div style="display:flex;gap:4px">
              <button class="action-btn" onclick="copyPayload('${p.id}')" title="Copy">📋</button>
              <button class="action-btn danger" onclick="deletePayload('${p.id}')" title="Delete">🗑</button>
            </div>
          </div>
          <div style="font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:8px">${p.name}</div>
          <div class="code-block" style="font-size:12px;padding:10px 12px;margin-bottom:8px;cursor:pointer;user-select:all" onclick="copyPayloadText('${p.id}')" title="Click to copy">
            ${escapeHtml(p.payload)}
          </div>
          ${p.notes ? `<div style="font-size:11px;color:var(--text-secondary);line-height:1.5">${escapeHtml(p.notes)}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

function escapeHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.copyPayload = window.copyPayloadText = function(id) {
  const p = TaxonoX.Storage.get('payloads', []).find(x => x.id === id);
  if (!p) return;
  navigator.clipboard.writeText(p.payload).then(() => {
    TaxonoX.showToast('success', 'Copied!', 'Payload copied to clipboard');
  }).catch(() => {
    TaxonoX.showToast('info', 'Copy Payload', p.payload.slice(0, 60) + '…');
  });
};

window.deletePayload = function(id) {
  if (!confirm('Delete this payload?')) return;
  let payloads = TaxonoX.Storage.get('payloads', []);
  payloads = payloads.filter(p => p.id !== id);
  TaxonoX.Storage.set('payloads', payloads);
  TaxonoX.showToast('success', 'Deleted', 'Payload removed');
  buildCategoryPills();
  loadPayloads();
};

document.addEventListener('DOMContentLoaded', () => {
  buildCategoryPills();
  loadPayloads();

  const search = document.getElementById('payload-search');
  if (search) {
    let dt;
    search.addEventListener('input', () => { clearTimeout(dt); dt = setTimeout(loadPayloads, 200); });
  }

  const form = document.getElementById('add-payload-form');
  if (form) {
    form.addEventListener('submit', e => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(form));
      const payloads = TaxonoX.Storage.get('payloads', []);
      payloads.unshift({
        id: 'PAY-' + String(Date.now()).slice(-6),
        name: data.name,
        category: data.category,
        payload: data.payload,
        notes: data.notes || '',
        tags: data.tags ? data.tags.split(',').map(t=>t.trim()).filter(Boolean) : []
      });
      TaxonoX.Storage.set('payloads', payloads);
      TaxonoX.closeModal('add-payload-modal');
      form.reset();
      TaxonoX.showToast('success', 'Payload Added', `${data.name} saved to vault`);
      buildCategoryPills();
      loadPayloads();
    });
  }
});
</script>
